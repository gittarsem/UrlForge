version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: urlforge-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: urlforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .

    container_name: urlforge-app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/urlforge
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      PORT: 8080

volumes:
  postgres-data: